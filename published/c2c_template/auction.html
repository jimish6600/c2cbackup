<div class="p-4">
  <b-tabs card>
    <!-- Dashboard Tab -->
    <b-tab title="Dashboard">
      <p class="mt-2">Dashboard content goes here...</p>
    </b-tab>

    <b-tab title="Auctions" active>
      <div class="d-flex justify-content-between align-items-center my-3">
        <!-- Search input with icon -->
        <div class="mb-2 mb-md-0" style="max-width: 400px; flex: 1;">
          <div class="input-group">
            <div class="input-group-prepend">
              <span class="input-group-text bg-white border-right-0">
                <!-- Search icon SVG -->
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                  <path d="M11 6a5 5 0 1 0-1.293 3.293l3.854 3.853a1 1 0 0 0 1.415-1.414l-3.854-3.853A5 5 0 0 0 11 6zM6 10a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/>
                </svg>
              </span>
            </div>
            <input type="text" class="form-control border-left-0" placeholder="Search Auction" />
          </div>
        </div>

        <div class="d-flex align-items-center mb-2 mb-md-0">
          <!-- Dollar Circle Button -->
          <b-button variant="success" class="d-flex align-items-center text-white mr-2">
            <span class="mr-2 d-flex align-items-center">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 64 64" fill="none" stroke="white" stroke-width="2">
                <rect x="29" y="13" width="2" height="39" />
                <rect x="33" y="13" width="2" height="39" />
                <path fill="none" stroke="white" stroke-width="2" stroke-miterlimit="10" d="M40.988,23c0,0,0-6-9-6s-8,7-8,7s0,7,8,7c9,0,10.012,6,10.012,7c0,2,0.988,8-10.012,8c-9,0-8.988-4-8.988-5"/>
                <path fill="none" stroke="white" stroke-width="2" stroke-miterlimit="10" d="M53.92,10.081c12.107,12.105,12.107,31.732,0,43.838c-12.106,12.108-31.734,12.108-43.839,0c-12.107-12.105-12.107-31.732,0-43.838C22.186-2.027,41.813-2.027,53.92,10.081z"/>
              </svg>
            </span>
            <span class="text-white">Penny</span>
          </b-button>

          <!-- Create Auction Button -->
          <b-button variant="success" class="d-flex align-items-center text-white">
            <b-icon icon="plus-circle" class="mr-2" font-scale="1.2" variant="light"></b-icon>
            <span class="text-white">Create Auction</span>
          </b-button>
        </div>
      </div>

      <!-- Auction Table -->
      <b-table
        :items="auctions"
        :fields="fields"
        responsive
        bordered
        hover
        show-empty
        :select-mode="null"
        :tbody-tr-class="rowClass"
      >
        <!-- Auction Name -->
        <template #cell(auction_name)="data">
          <div class="d-flex justify-content-between align-items-center">
            <span>%%data.item.auction_name %%</span>
            <b-button
              size="sm"
              variant="outline-secondary"
              class="ml-2 p-1"
              @click.stop="toggleDetails(data.item)"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                <path d="M8 1a.5.5 0 0 1 .5.5v6.5H15a.5.5 0 0 1 0 1H8.5V15a.5.5 0 0 1-1 0V9.5H1a.5.5 0 0 1 0-1h6.5V1.5A.5.5 0 0 1 8 1z"/>
              </svg>
            </b-button>
          </div>
        </template>

        <!-- Start Date -->
        <template #cell(start_date)="data">
          %%formatDateTime(data.item.start_date) %%
        </template>

        <!-- End Date -->
        <template #cell(end_date)="data">
          %%formatDateTime(data.item.end_date) %%
        </template>

        <!-- Highest Bid -->
        <template #cell(bids.highest_bid)="data">
          %%data.item.bids?.highest_bid || 'NA' %%
        </template>

        <!-- Status with badge color -->
        <template #cell(status)="data">
          <b-badge :variant="statusColorMap[data.item.status?.color || 'gray']">
            %%data.item.status?.text || 'Unknown' %%
          </b-badge>
        </template>

        <!-- Actions -->
        <template #cell(actions)="data">
          <div class="d-flex align-items-center">
            <!-- Edit Button (only if auction is not ENDED) -->
            <b-button
              v-if="data.item.status?.text !== 'ENDED'"
              size="xs"
              class="border-0 mr-2"
              variant="outline-primary"
              @click="handleEdit(data.item)"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16" title="Edit">
                <path d="M15.502 1.94a.5.5 0 0 1 0 .706l-1.207 1.207-2.121-2.121L13.38.525a.5.5 0 0 1 .707 0l1.414 1.414zM1 13.5V16h2.5l9.146-9.146-2.5-2.5L1 13.5z"/>
              </svg>
            </b-button>

            <!-- Delete Button -->
            <b-button
              size="xs"
              class="border-0"
              variant="outline-danger"
              @click="handleDelete(data.item)"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16" title="Delete">
                <path d="M5.5 5.5a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0v-6a.5.5 0 0 1 .5-.5zm5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0v-6a.5.5 0 0 1 .5-.5z"/>
                <path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1 0-2h3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1h3a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118z"/>
              </svg>
            </b-button>
          </div>
        </template>

        <!-- Expandable Row Details -->
        <template #row-details="row">
          <b-table
            class="auction-screen"
            :items="row.item.bidders"
            :fields="bidderFields"
            small
            responsive
          >
            <template #cell(actions)="row">
              <b-button size="sm" variant="outline-secondary">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                  <path d="M14.778 4.222a.5.5 0 0 0-.434-.777H3.5v-1a.5.5 0 0 0-1 0v11.5a.5.5 0 0 0 1 0v-4h10.844a.5.5 0 0 0 .434-.777L12.5 5l2.278-2.778z"/>
                </svg>
              </b-button>
            </template>
          </b-table>
        </template>
      </b-table>
    </b-tab>
  </b-tabs>
</div>
